# Panelin v5.0 — Docker Compose for local development
# Starts: Panelin Agno Agent + PostgreSQL + MCP Server

version: "3.9"

services:
  # ── PostgreSQL (session storage + knowledge) ──
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: panelin
      POSTGRES_PASSWORD: panelin
      POSTGRES_DB: panelin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panelin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MCP Server (existing 25 tools) ──
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./bromyros_pricing_master.json:/app/bromyros_pricing_master.json:ro
      - ./accessories_catalog.json:/app/accessories_catalog.json:ro
      - ./bom_rules.json:/app/bom_rules.json:ro
      - ./BMC_Base_Conocimiento_GPT-2.json:/app/BMC_Base_Conocimiento_GPT-2.json:ro
    environment:
      MCP_SERVER_TRANSPORT: sse
      MCP_SERVER_HOST: "0.0.0.0"
      MCP_SERVER_PORT: "8000"

  # ── Panelin Agno Agent ──
  panelin:
    build:
      context: .
      dockerfile: Dockerfile.agno
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+psycopg://panelin:panelin@postgres:5432/panelin"
      MCP_SERVER_URL: "http://mcp-server:8000/sse"
      MCP_TRANSPORT: "sse"
      PORT: "8080"

volumes:
  pgdata:
