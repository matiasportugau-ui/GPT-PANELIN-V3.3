# ==============================================================================
# Panelin v5.0 - Docker Compose (Development)
# ==============================================================================
# Runs: Panelin API (Agno) + PostgreSQL + MCP Server

services:
  # ── PostgreSQL for session storage ──
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: panelin
      POSTGRES_USER: panelin
      POSTGRES_PASSWORD: panelin_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panelin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MCP Server (existing, SSE transport) ──
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - WOLF_API_KEY=${WOLF_API_KEY:-}
      - WOLF_API_URL=http://panelin-api:8080
    command: ["python", "-m", "mcp.server", "--transport", "sse", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy

  # ── Panelin API (Agno Architecture) ──
  panelin-api:
    build:
      context: .
      dockerfile: Dockerfile.agno
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - PORT=8080
      - LOG_LEVEL=INFO
      # Database
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=panelin
      - DB_USER=panelin
      - DB_PASSWORD=panelin_dev
      # LLM
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL_ID=${LLM_MODEL_ID:-gpt-4o}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # MCP
      - MCP_TRANSPORT=sse
      - MCP_URL=http://mcp-server:8000/sse
      # Security
      - WOLF_API_KEY=${WOLF_API_KEY:-}
      - KB_WRITE_PASSWORD=${KB_WRITE_PASSWORD:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Google Cloud
      - KB_GCS_BUCKET=${KB_GCS_BUCKET:-}
      - SHEETS_SPREADSHEET_ID=${SHEETS_SPREADSHEET_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_started

volumes:
  pgdata:
