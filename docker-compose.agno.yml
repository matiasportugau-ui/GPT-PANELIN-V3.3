version: "3.8"

services:
  panelin-agno:
    build:
      context: .
      dockerfile: Dockerfile.agno
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - ENVIRONMENT=development
      - DEBUG=true
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/panelin
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=panelin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: ["python", "-m", "mcp.server", "--transport", "sse", "--port", "8000"]
    restart: unless-stopped

volumes:
  pgdata:
