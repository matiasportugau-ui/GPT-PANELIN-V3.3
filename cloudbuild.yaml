# Cloud Build - Panelin AgentOS deployment to Cloud Run

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - "build"
      - "-f"
      - "Dockerfile.production"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-cloud-run"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--platform=managed"
      - "--region=${_REGION}"
      - "--service-account=cloud-run-service-account@$PROJECT_ID.iam.gserviceaccount.com"
      - "--allow-unauthenticated"
      - "--add-cloudsql-instances=$PROJECT_ID:${_REGION}:${_DB_INSTANCE}"
      - "--set-env-vars=PANELIN_CLOUD_SQL_CONNECTION_NAME=$PROJECT_ID:${_REGION}:${_DB_INSTANCE},PANELIN_DB_USER=${_DB_USER},PANELIN_DB_NAME=${_DB_NAME},PANELIN_MODEL_PROVIDER=${_MODEL_PROVIDER},PANELIN_OPENAI_MODEL_ID=${_OPENAI_MODEL_ID},PANELIN_ENABLE_MCP_TOOLS=true,PANELIN_MCP_TRANSPORT=sse,PANELIN_MCP_SSE_URL=${_MCP_SSE_URL},PANELIN_CORS_ALLOW_ORIGINS=${_PANELIN_CORS_ALLOW_ORIGINS},WOLF_CORS_ALLOW_ORIGINS=${_WOLF_CORS_ALLOW_ORIGINS}"
      - "--set-secrets=PANELIN_DB_PASSWORD=${_DB_PASSWORD_SECRET}:latest,OPENAI_API_KEY=${_OPENAI_API_KEY_SECRET}:latest,WOLF_API_KEY=${_WOLF_API_KEY_SECRET}:latest"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest"

substitutions:
  _REGION: "us-central1"
  _REPOSITORY: "cloud-run-repo"
  _SERVICE_NAME: "panelin-agentos"
  _DB_INSTANCE: "web-app-db"
  _DB_USER: "postgres"
  _DB_NAME: "app_database"
  _MODEL_PROVIDER: "openai"
  _OPENAI_MODEL_ID: "gpt-4o-mini"
  _MCP_SSE_URL: "http://panelin-mcp:8000/sse"
  _PANELIN_CORS_ALLOW_ORIGINS: "https://chatgpt.com,https://chat.openai.com"
  _WOLF_CORS_ALLOW_ORIGINS: "https://chatgpt.com,https://chat.openai.com"
  _DB_PASSWORD_SECRET: "panelin-db-password"
  _OPENAI_API_KEY_SECRET: "openai-api-key"
  _WOLF_API_KEY_SECRET: "wolf-api-key"

options:
  logging: CLOUD_LOGGING_ONLY
