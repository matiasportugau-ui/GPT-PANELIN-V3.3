name: 🌅 Manual Morning Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: read

jobs:
  audit:
    name: Run PANELIN morning audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔐 Setup credentials
        env:
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
        run: |
          if [ -z "$GOOGLE_SHEETS_CREDS" ]; then
            echo "❌ Missing required secret: GOOGLE_SHEETS_CREDS"
            exit 1
          fi
          mkdir -p scripts/credentials
          printf '%s' "$GOOGLE_SHEETS_CREDS" > scripts/credentials/service_account.json

      - name: 🌅 Run morning audit
        env:
          GOOGLE_SHEETS_ID: 1RHJ1eQlCWMcWY5NKkHCsH5F5XavC9yebh97bruJilbs
          GOOGLE_SHEETS_CREDENTIALS_PATH: ./scripts/credentials/service_account.json
          ML_ACCESS_TOKEN: ${{ secrets.ML_ACCESS_TOKEN }}
          ML_USER_ID: ${{ vars.ML_USER_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ vars.META_PAGE_ID }}
          META_PAGE_NAME: ${{ vars.META_PAGE_NAME }}
          GMAIL_QUERY_FILTER: ${{ vars.GMAIL_QUERY_FILTER }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python scripts/morning_audit.py

      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs
          path: scripts/logs/
