name: Test Suite

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f mcp/requirements.txt ]; then pip install -r mcp/requirements.txt; fi
          if [ -f panelin_mcp_server/requirements.txt ]; then pip install -r panelin_mcp_server/requirements.txt; fi
          pip install pytest pytest-asyncio pytest-cov
      
      - name: Run unit tests
        run: |
          echo "🧪 Running unit tests..."
          if [ -d mcp ]; then
            pytest test_mcp_handlers_v1.py -v --cov=mcp --cov-report=term
          elif [ -d panelin_mcp_server ]; then
            pytest test_mcp_handlers_v1.py -v --cov=panelin_mcp_server --cov-report=term
          else
            echo "⚠️ No MCP directory found, skipping MCP tests"
          fi
      
      - name: Test MCP server startup
        run: |
          echo "🔌 Testing MCP server initialization..."
          if [ -f mcp/server.py ]; then
            if timeout 5 python mcp/server.py --help 2>&1 | head -20; then
              echo "✅ MCP server (mcp/) can be imported and initialized"
            else
              echo "⚠️ MCP server startup test completed (may have timed out)"
            fi
          elif [ -f panelin_mcp_server/server.py ]; then
            if timeout 5 python panelin_mcp_server/server.py --help 2>&1 | head -20; then
              echo "✅ MCP server (panelin_mcp_server/) can be imported and initialized"
            else
              echo "⚠️ MCP server startup test completed (may have timed out)"
            fi
          else
            echo "⚠️ No MCP server found, skipping startup test"
          fi
      
      - name: Integration tests for MCP server
        run: |
          echo "🔗 Running MCP integration tests..."
          python -c "
          import sys
          from pathlib import Path
          
          # Determine which MCP directory exists (mcp/ or panelin_mcp_server/)
          mcp_dir = None
          if Path('mcp/handlers').exists():
              mcp_dir = 'mcp'
          elif Path('panelin_mcp_server/handlers').exists():
              mcp_dir = 'panelin_mcp_server'
          
          if mcp_dir is None:
              print('⚠️ No MCP handlers directory found, skipping integration tests')
              sys.exit(0)
          
          # Test that MCP handlers can be imported
          try:
              if mcp_dir == 'mcp':
                  from mcp.handlers import pricing, catalog, bom
              else:
                  from panelin_mcp_server.handlers import pricing, catalog, bom
              print(f'✅ MCP handlers imported successfully from {mcp_dir}')
          except ImportError as e:
              print(f'❌ Failed to import MCP handlers: {e}')
              sys.exit(1)
          
          # Test that contracts can be loaded
          try:
              import json
              contracts_dir = Path('mcp_tools/contracts')
              if contracts_dir.exists():
                  for contract_file in contracts_dir.glob('*.v1.json'):
                      with open(contract_file, 'r') as f:
                          json.load(f)
                  print('✅ All contract files are valid JSON')
              else:
                  print('⚠️ Contracts directory not found')
          except Exception as e:
              print(f'❌ Failed to load contracts: {e}')
              sys.exit(1)
          "
      
      - name: OpenAI ecosystem tests
        run: |
          echo "🤖 Testing OpenAI ecosystem compatibility..."
          python -c "
          import sys
          from pathlib import Path
          
          # Determine which MCP directory exists (mcp/ or panelin_mcp_server/)
          mcp_dir = None
          if Path('mcp/handlers').exists():
              mcp_dir = 'mcp'
          elif Path('panelin_mcp_server/handlers').exists():
              mcp_dir = 'panelin_mcp_server'
          
          if mcp_dir is None:
              print('⚠️ No MCP directory found, skipping OpenAI ecosystem tests')
              sys.exit(0)
          
          # Verify MCP tools structure
          tools_dir = Path(f'{mcp_dir}/tools')
          if tools_dir.exists():
              tool_files = list(tools_dir.glob('*.json'))
              print(f'✅ Found {len(tool_files)} MCP tool definitions in {mcp_dir}')
          else:
              print(f'⚠️ MCP tools directory not found in {mcp_dir}')
          
          # Verify handlers are compatible with expected interface
          try:
              if mcp_dir == 'mcp':
                  from mcp.handlers.pricing import handle_price_check
                  from mcp.handlers.catalog import handle_catalog_search
                  from mcp.handlers.bom import handle_bom_calculate
              else:
                  from panelin_mcp_server.handlers.pricing import handle_price_check
                  from panelin_mcp_server.handlers.catalog import handle_catalog_search
                  from panelin_mcp_server.handlers.bom import handle_bom_calculate
              print('✅ All core handlers are importable')
          except ImportError as e:
              print(f'❌ Handler import failed: {e}')
              sys.exit(1)
          "
      
      - name: Knowledge base validation
        run: |
          echo "📚 Validating knowledge base files..."
          python -c "
          import json
          import sys
          from pathlib import Path
          
          # List of required knowledge base files
          kb_files = [
              'bromyros_pricing_master.json',
              'bromyros_pricing_gpt_optimized.json',
              'BMC_Base_Conocimiento_GPT-2.json',
              'bom_rules.json',
              'accessories_catalog.json',
              'shopify_catalog_v1.json'
          ]
          
          passed = 0
          failed = 0
          
          for file in kb_files:
              path = Path(file)
              if not path.exists():
                  print(f'⚠️ {file} not found (may be optional)')
                  continue
              
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      data = json.load(f)
                  
                  # Basic validation
                  if isinstance(data, dict):
                      print(f'✅ {file} is valid (dict with {len(data)} keys)')
                  elif isinstance(data, list):
                      print(f'✅ {file} is valid (list with {len(data)} items)')
                  else:
                      print(f'✅ {file} is valid JSON')
                  passed += 1
              except json.JSONDecodeError as e:
                  print(f'❌ {file} has invalid JSON: {e}')
                  failed += 1
              except Exception as e:
                  print(f'❌ {file} error: {e}')
                  failed += 1
          
          print(f'\n📊 Validation summary: {passed} passed, {failed} failed')
          if failed > 0:
              sys.exit(1)
          "
      
      - name: Quotation calculator tests
        run: |
          echo "🧮 Testing quotation calculator..."
          python -c "
          import sys
          from pathlib import Path
          
          calc_file = Path('quotation_calculator_v3.py')
          if calc_file.exists():
              try:
                  import quotation_calculator_v3
                  print('✅ Quotation calculator module can be imported')
              except ImportError as e:
                  print(f'⚠️ Could not import quotation calculator: {e}')
          else:
              print('⚠️ Quotation calculator not found')
          "
