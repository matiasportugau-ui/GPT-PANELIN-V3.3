# Deploy Panelin API to Cloud Run
#
# Deploys the unified Panelin API (Wolf API + v4 Engine) to Google Cloud Run.
# Uses Dockerfile.production at repo root for the complete container.
#
# Triggered on push to main when relevant files change, or manually.

 name:Deploy Panelin API to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'wolf_api/**'
      - 'panelin_v4/**'
      - 'app.py'
      - 'Dockerfile.production'
      - 'bom_rules.json'
      - 'accessories_catalog.json'
      - 'bromyros_pricing_gpt_optimized.json'
      - 'BMC_Base_Conocimiento_GPT-2.json'
      - '.github/workflows/deploy-wolf-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: chatbot-bmc-live
  REGION: us-central1
  SERVICE_NAME: panelin-api
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    name: Deploy Panelin API
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cloud-run-repo/wolf-api"
          docker build \
            -f Dockerfile.production \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            -t "${IMAGE_NAME}:latest" \
            .
          docker push "${IMAGE_NAME}:${{ github.sha }}"
          docker push "${IMAGE_NAME}:latest"

- name: Validate required secrets
run: |
missing=""
if [ -z "$SA" ]; then missing="$missing GCP_RUNTIME_SA_EMAIL"; fi
if [ -z "$BUCKET" ]; then missing="$missing KB_GCS_BUCKET"; fi
if [ -n "$missing" ]; then
echo "::error::Missing required secrets:$missing"
exit 1
fi
env:
SA: ${{ secrets.GCP_RUNTIME_SA_EMAIL }}
BUCKET: ${{ secrets.KB_GCS_BUCKET }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cloud-run-repo/wolf-api:${{ github.sha }}
          env_vars: |
            KB_GCS_BUCKET=${{ secrets.KB_GCS_BUCKET }}
            KB_GCS_PREFIX=kb/conversations
            KB_GCS_MODE=daily_jsonl
            KB_GCS_MAX_RETRIES=5
            CATALOG_PATH=/app/catalog.json
          env_vars_update_strategy: merge
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --timeout=60

      - name: Show service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Panelin API deployed to: $SERVICE_URL"
          echo "OpenAPI docs: $SERVICE_URL/docs"
          echo ""
          echo "Endpoints available:"
          echo "  Legacy:  /calculate_quote, /find_products, /product_price, /check_availability"
          echo "  Engine:  /api/quote, /api/validate, /api/sai-score"
          echo "  KB:      /kb/conversations, /kb/corrections, /kb/customers"
          echo "  Sheets:  /sheets/consultations, /sheets/quotation_line, /sheets/update_row, etc."
